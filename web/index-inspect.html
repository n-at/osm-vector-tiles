<!DOCTYPE html>
<html lang="en">
<head>
    <title>OSM Planet</title>

    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel='stylesheet' href='/node_modules/maplibre-gl/dist/maplibre-gl.css' />
    <script src='/node_modules/maplibre-gl/dist/maplibre-gl.js'></script>

    <link rel="stylesheet" href="node_modules/@maplibre/maplibre-gl-inspect/dist/maplibre-gl-inspect.css">
    <script src="node_modules/@maplibre/maplibre-gl-inspect/dist/maplibre-gl-inspect.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
        }

        html, body, #map { 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        (() => {
            const map = new maplibregl.Map({
                container: 'map',
                style: `/style.json`,
                //center: [33.350276, 35.154792], //cyprus-latest
                center: [28.332792, 57.819307], //russia-szfo-latest
                zoom: 12,
            });

            map.addControl(new maplibregl.NavigationControl());

            map.addControl(new maplibregl.ScaleControl({
                unit: 'metric',
                maxWidth: 100,
            }));

            map.addControl(new MaplibreInspect());
        })();
    </script>
</body>
</html>
